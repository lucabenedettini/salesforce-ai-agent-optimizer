name: Validate Skill

on:
  push:
  pull_request:

jobs:
  validate:
    name: ${{ matrix.os }} / Python ${{ matrix.python-version }}
    runs-on: ${{ matrix.os }}
    strategy:
      fail-fast: false
      matrix:
        os:
          - ubuntu-latest
          - macos-latest
          - windows-latest
        python-version:
          - "3.10"
          - "3.11"
          - "3.12"
    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Set up Python
        uses: actions/setup-python@v5
        with:
          python-version: ${{ matrix.python-version }}

      - name: Install validation dependencies
        run: python -m pip install --upgrade pip PyYAML pytest

      - name: Validate skill package
        run: python scripts/validate_skill.py

      - name: Run self tests
        run: python scripts/self_test.py --json

      - name: Run pytest
        run: python -m pytest
