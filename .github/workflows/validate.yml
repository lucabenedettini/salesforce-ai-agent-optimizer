name: Validate Skill

on:
  pull_request:
  push:
    branches:
      - main

jobs:
  validate:
    name: ${{ matrix.os }} / Python ${{ matrix.python-version }}
    runs-on: ${{ matrix.os }}
    defaults:
      run:
        shell: bash
    strategy:
      fail-fast: false
      matrix:
        os:
          - ubuntu-latest
          - macos-latest
          - windows-latest
        python-version:
          - "3.10"
          - "3.11"
          - "3.12"
    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Set up Python
        uses: actions/setup-python@v5
        with:
          python-version: ${{ matrix.python-version }}

      - name: Install package with dev dependencies
        run: |
          python -m pip install --upgrade pip
          python -m pip install -e ".[dev]"

      - name: Run sfao core commands
        run: |
          sfao version
          sfao validate
          sfao doctor

      - name: Exercise install update uninstall
        run: |
          mkdir -p "$RUNNER_TEMP/sfao-install-test"
          cd "$RUNNER_TEMP/sfao-install-test"
          sfao install --project --platform all
          sfao update --project --platform all
          sfao uninstall --project --platform all --yes

      - name: Exercise Knowledge commands
        run: |
          sfao knowledge init --project-root tests/fixtures/sfdx-project
          sfao knowledge refresh --project-root tests/fixtures/sfdx-project
          sfao knowledge doctor --project-root tests/fixtures/sfdx-project

      - name: Exercise version-context commands
        run: |
          sfao version-context scaffold
          sfao version-context validate

      - name: Check generated agent instructions
        run: python scripts/sync_agent_instructions.py --check --json

      - name: Validate skill package
        run: python scripts/validate_skill.py --json

      - name: Run self tests
        run: python scripts/self_test.py --json

      - name: Compile script files
        run: python -m py_compile scripts/*.py

      - name: Compile package files
        run: python -m py_compile src/salesforce_agent_optimizer/*.py

      - name: Run pytest
        run: python -m pytest

      - name: Run ruff
        run: python -m ruff check .

      - name: Clean distribution workspace
        run: rm -rf dist build src/*.egg-info

      - name: Build wheel and sdist
        run: python -m build

      - name: Check distributions
        run: python -m twine check dist/*.whl dist/*.tar.gz
