name: Validate Skill

on:
  pull_request:
  push:
    branches:
      - main

jobs:
  validate:
    name: ${{ matrix.os }} / Python ${{ matrix.python-version }}
    runs-on: ${{ matrix.os }}
    strategy:
      fail-fast: false
      matrix:
        os:
          - ubuntu-latest
          - macos-latest
          - windows-latest
        python-version:
          - "3.10"
          - "3.11"
          - "3.12"
    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Set up Python
        uses: actions/setup-python@v5
        with:
          python-version: ${{ matrix.python-version }}

      - name: Install package with dev dependencies
        run: |
          python -m pip install --upgrade pip
          python -m pip install -e ".[dev]"

      - name: Check generated agent instructions
        run: python scripts/sync_agent_instructions.py --check --json

      - name: Validate skill package
        run: python scripts/validate_skill.py --json

      - name: Run self tests
        run: python scripts/self_test.py --json

      - name: Compile Python files
        run: python -m compileall -q scripts src tests -x "templates"

      - name: Run pytest
        run: python -m pytest

      - name: Run ruff
        run: python -m ruff check .

      - name: Validate through sfao
        run: sfao validate

      - name: Run doctor
        run: sfao doctor
