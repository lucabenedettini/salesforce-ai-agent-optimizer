name: Release

on:
  push:
    tags:
      - "v*"

permissions:
  contents: read

jobs:
  build:
    name: Build release artifacts
    runs-on: ubuntu-latest
    permissions:
      contents: write
    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Set up Python
        uses: actions/setup-python@v5
        with:
          python-version: "3.12"

      - name: Install package with dev dependencies
        run: |
          python -m pip install --upgrade pip
          python -m pip install -e ".[dev]"

      - name: Check generated agent instructions
        run: python scripts/sync_agent_instructions.py --check --json

      - name: Validate skill package
        run: python scripts/validate_skill.py --json

      - name: Run self tests
        run: python scripts/self_test.py --json

      - name: Run pytest
        run: python -m pytest

      - name: Run ruff
        run: python -m ruff check .

      - name: Validate through sfao
        run: sfao validate

      - name: Build wheel and sdist
        run: python -m build

      - name: Check distributions
        run: python -m twine check dist/*

      - name: Build release artifacts
        run: python scripts/build_release_artifacts.py

      - name: Upload Python distributions artifact
        uses: actions/upload-artifact@v4
        with:
          name: python-package-distributions
          path: |
            dist/*.whl
            dist/*.tar.gz

      - name: Upload release assets
        uses: softprops/action-gh-release@v2
        with:
          files: |
            dist/*

  publish-pypi:
    name: Publish package to PyPI
    needs: build
    runs-on: ubuntu-latest
    if: startsWith(github.ref, 'refs/tags/') && vars.PUBLISH_TO_PYPI == 'true'
    environment:
      name: pypi
      url: https://pypi.org/p/salesforce-agent-optimizer
    permissions:
      id-token: write
    steps:
      - name: Download distributions
        uses: actions/download-artifact@v4
        with:
          name: python-package-distributions
          path: dist/

      - name: Publish package distributions to PyPI
        uses: pypa/gh-action-pypi-publish@release/v1
